<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
    <div class="navbar"> 
        <div class="logo">
            <h2>Attendify</h2>
        </div>
        <div class="nbtn">
           <i class="fa-solid fa-circle-user user-icon"></i>
        </div>
    </div>
    
    <div class="view-area">
        
        <div class="card" id="generateCard">
            <div class="icon">
                <i class="fa-solid fa-qrcode card-icon"></i>
            </div>
            <div class="heading">
                <h2>Generate QR</h2>
            </div>
        </div>
    
        <div class="card" id="viewAttendance">
            <div class="icon">
                <i class="fa-solid fa-eye card-icon"></i>
            </div>
            <div class="heading">
                <h2>All Attendance</h2>
            </div>
        </div>
    </div>
<script>
    document.getElementById("generateCard").addEventListener("click", function () {
        window.location.href = "./generate-qr.html";
    });
</script>
<script>
document.getElementById("viewAttendance").addEventListener("click", function () {
    window.location.href = "./admin-attendance.html";
});
</script>
    
</body>
</html>
